name: Windows RDP (Playit - no new user)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Download Playit
      run: |
        $release = Invoke-RestMethod "https://api.github.com/repos/playit-cloud/playit-agent/releases/latest"

        $asset = $release.assets | Where-Object {
            $_.name -like "*windows*" -and $_.name -like "*.exe"
        } | Select-Object -First 1

        if (-not $asset) {
            Write-Host "No Windows exe found"
            exit 1
        }

        Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "playit.exe"

    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Set Password for runneradmin
      run: |
        net user runneradmin P@ssw0rd123

    - name: Start Playit Tunnel (VISIBLE OUTPUT)
      run: |
        .\playit.exe

    - name: Keep Alive
      run: |
        while ($true) { Start-Sleep -Seconds 60 }
